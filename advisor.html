<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Style Advisor — StyleHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#6C3BFF;--accent:#C850C0;
      --grad:linear-gradient(135deg,#6C3BFF,#C850C0);
      --bg:#0a0a0b;--surface:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.1);
      --text:#fff;--text2:rgba(255,255,255,0.7);--text3:rgba(255,255,255,0.4);
      --radius:16px;--font-head:'Outfit',sans-serif;--font-body:'Inter',sans-serif;
    }
    html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);}

    /* ── Background orbs ── */
    .bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
    .bg-orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(108,59,255,0.2),transparent 70%);top:-150px;left:-150px;}
    .bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(200,80,192,0.15),transparent 70%);bottom:-100px;right:-100px;}

    /* ── Header ── */
    .adv-header{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;gap:14px;
      padding:14px 20px;
      background:rgba(10,10,11,0.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .adv-back{
      display:flex;align-items:center;justify-content:center;
      width:38px;height:38px;border-radius:50%;
      background:var(--surface);border:1px solid var(--border);
      color:var(--text2);font-size:1.1rem;cursor:pointer;
      text-decoration:none;transition:background 0.2s;
    }
    .adv-back:hover{background:rgba(108,59,255,0.2);}
    .adv-logo{display:flex;align-items:center;gap:8px;}
    .adv-logo-icon{
      width:36px;height:36px;border-radius:10px;
      background:var(--grad);display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;box-shadow:0 4px 14px rgba(108,59,255,0.4);
    }
    .adv-logo-text{font-family:var(--font-head);font-size:1.1rem;font-weight:800;}
    .adv-logo-text span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .adv-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text3);}
    .adv-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ── Chat area ── */
    .adv-body{
      position:relative;z-index:1;
      display:flex;flex-direction:column;
      height:calc(100vh - 67px);
    }
    .chat-messages{
      flex:1;overflow-y:auto;padding:20px 16px;
      display:flex;flex-direction:column;gap:16px;
      scrollbar-width:thin;scrollbar-color:rgba(108,59,255,0.3) transparent;
    }
    .chat-messages::-webkit-scrollbar{width:4px;}
    .chat-messages::-webkit-scrollbar-thumb{background:rgba(108,59,255,0.3);border-radius:2px;}

    /* ── Messages ── */
    .msg{display:flex;gap:10px;max-width:85%;animation:msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.bot{align-self:flex-start;}

    .msg-avatar{
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:1rem;
    }
    .msg.bot .msg-avatar{background:var(--grad);box-shadow:0 4px 12px rgba(108,59,255,0.4);}
    .msg.user .msg-avatar{background:rgba(255,255,255,0.1);border:1px solid var(--border);}

    .msg-bubble{
      padding:12px 16px;border-radius:18px;
      font-size:0.88rem;line-height:1.6;
    }
    .msg.bot .msg-bubble{
      background:rgba(255,255,255,0.07);
      border:1px solid var(--border);
      border-bottom-left-radius:4px;
      color:var(--text);
    }
    .msg.user .msg-bubble{
      background:var(--grad);
      border-bottom-right-radius:4px;
      color:#fff;
    }
    .msg-time{font-size:0.65rem;color:var(--text3);margin-top:4px;text-align:right;}
    .msg.bot .msg-time{text-align:left;}

    /* ── Typing indicator ── */
    .typing{display:flex;gap:5px;padding:14px 16px;align-items:center;}
    .typing span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:typingDot 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:0.2s;}
    .typing span:nth-child(3){animation-delay:0.4s;}
    @keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ── Quick suggestions ── */
    .quick-chips{
      display:flex;flex-wrap:wrap;gap:8px;
      padding:0 16px 12px;
    }
    .quick-chip{
      padding:7px 14px;border-radius:999px;
      font-size:0.75rem;font-weight:600;font-family:var(--font-body);
      background:rgba(108,59,255,0.15);border:1px solid rgba(108,59,255,0.3);
      color:rgba(255,255,255,0.8);cursor:pointer;
      transition:background 0.2s,transform 0.2s;
    }
    .quick-chip:hover{background:rgba(108,59,255,0.35);transform:translateY(-1px);}

    /* ── Input bar ── */
    .chat-input-bar{
      padding:12px 16px;
      background:rgba(10,10,11,0.9);
      backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex;gap:10px;align-items:flex-end;
    }
    .chat-input{
      flex:1;background:rgba(255,255,255,0.07);
      border:1.5px solid var(--border);border-radius:14px;
      padding:12px 16px;font-size:0.9rem;font-family:var(--font-body);
      color:#fff;outline:none;resize:none;max-height:120px;min-height:46px;
      transition:border-color 0.2s;line-height:1.5;
    }
    .chat-input::placeholder{color:var(--text3);}
    .chat-input:focus{border-color:var(--primary);}
    .send-btn{
      width:46px;height:46px;border-radius:14px;flex-shrink:0;
      background:var(--grad);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 14px rgba(108,59,255,0.4);
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .send-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(108,59,255,0.6);}
    .send-btn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

    /* ── Welcome card ── */
    .welcome-card{
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      border-radius:20px;padding:24px;margin:8px 0;text-align:center;
    }
    .welcome-card .wc-icon{font-size:2.5rem;margin-bottom:12px;}
    .welcome-card h2{font-family:var(--font-head);font-size:1.3rem;font-weight:800;margin-bottom:8px;}
    .welcome-card p{font-size:0.82rem;color:var(--text2);line-height:1.6;}
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <header class="adv-header">
    <a href="index.html" class="adv-back">←</a>
    <div class="adv-logo">
      <div class="adv-logo-icon">✨</div>
      <div class="adv-logo-text">Zara <span>AI Stylist</span></div>
    </div>
    <div class="adv-status">
      <div class="adv-dot"></div>
      Online
    </div>
  </header>

  <div class="adv-body">
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-card">
        <div class="wc-icon">👗</div>
        <h2>Meet Zara, Your Personal Stylist</h2>
        <p>I'm your AI fashion stylist with 15 years of experience. Tell me your occasion, what you own, your style goals — and I'll build you a complete look. The more you tell me, the better I style you!</p>
      </div>
    </div>

    <div class="quick-chips" id="quick-chips">
      <button class="quick-chip" onclick="sendQuick(this)">I have a wedding next week, help me!</button>
      <button class="quick-chip" onclick="sendQuick(this)">What colors suit my dark skin tone?</button>
      <button class="quick-chip" onclick="sendQuick(this)">Build me a capsule wardrobe</button>
      <button class="quick-chip" onclick="sendQuick(this)">I have a job interview tomorrow</button>
      <button class="quick-chip" onclick="sendQuick(this)">How to style a saree modernly?</button>
      <button class="quick-chip" onclick="sendQuick(this)">What's trending in 2025?</button>
      <button class="quick-chip" onclick="sendQuick(this)">I only have jeans and tees, help!</button>
      <button class="quick-chip" onclick="sendQuick(this)">Best outfit for a first date?</button>
    </div>

    <div class="chat-input-bar">
      <textarea class="chat-input" id="chat-input" placeholder="Tell Zara your occasion, what you own, your vibe…" rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()" id="send-btn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ── GROQ API KEY ──
    const API_KEY = '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';
    const API_URL = 'https://api.groq.com/openai/v1/chat/completions';

    const input = document.getElementById('chat-input');
    const messagesEl = document.getElementById('chat-messages');

    const history = [
      {
        role: 'system',
        content: `You are Zara, a world-class personal fashion stylist and style advisor for StyleHub app. You have 15 years of experience styling celebrities, working with top fashion houses, and helping everyday people look their best.

Your personality:
- Warm, friendly, and encouraging — like a best friend who happens to be a fashion expert
- You speak naturally and conversationally, not like a robot
- You ask follow-up questions to give more personalized advice
- You remember context from earlier in the conversation
- You give specific, detailed, actionable advice — not generic tips
- You are honest — if something won't work, you say so kindly
- You use emojis naturally but not excessively

Your expertise covers:
- Complete outfit building from scratch
- Color theory and what works for different skin tones
- Dressing for every occasion (weddings, interviews, dates, parties, casual, office, festivals)
- Indian ethnic wear (sarees, lehengas, kurtas, sherwanis, anarkalis, dupattas)
- Western wear, streetwear, smart casual, formal, resort wear
- Body type styling and what flatters different shapes
- Seasonal and current fashion trends (2025-2026)
- Fabric knowledge (linen, cotton, silk, chiffon, velvet, denim, etc.)
- Accessory pairing (jewelry, bags, shoes, watches, scarves)
- Budget-friendly styling tips
- Capsule wardrobe building
- Color combinations and palette matching
- What NOT to wear for specific occasions

How you respond:
- For outfit questions: give a complete head-to-toe look with specific pieces, colors, and why it works
- For color questions: explain the color theory behind it, not just list colors
- For occasion dressing: consider the venue, time of day, dress code, and cultural context
- For skin tone questions: give specific color recommendations with reasoning
- Always end with a follow-up question or offer to refine the advice further
- If someone describes what they own, work with those pieces
- Give 2-3 options when possible so the person can choose

IMPORTANT: Only answer fashion, style, clothing, and appearance-related questions. If asked about anything else, say: "I'm Zara, your style advisor — I can only help with fashion and styling! What outfit can I help you with today? 👗"

Never make up specific prices. Be culturally sensitive especially with Indian fashion. Always be body-positive and inclusive.`
      }
    ];

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendQuick(btn) {
      input.value = btn.textContent;
      document.getElementById('quick-chips').style.display = 'none';
      sendMessage();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      appendMsg('user', text);
      input.value = '';
      input.style.height = 'auto';
      history.push({ role: 'user', content: text });
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: history,
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        const data = await res.json();
        removeTyping();

        if (data.choices && data.choices[0]) {
          const reply = data.choices[0].message.content;
          history.push({ role: 'assistant', content: reply });
          // Format reply: bold, line breaks, bullet points
          const formatted = reply
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/^[-•] (.+)/gm, '<span style="display:block;padding-left:8px;margin:2px 0">• $1</span>')
            .replace(/\n/g, '<br>');
          appendMsg('bot', formatted);
        } else {
          appendMsg('bot', 'Sorry, I could not get a response. Please try again.');
        }
      } catch (err) {
        removeTyping();
        appendMsg('bot', 'Connection error. Please check your internet and try again.');
      }
    }

    function appendMsg(role, text) {
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <div class="msg-avatar">${role === 'bot' ? '✨' : '👤'}</div>
        <div>
          <div class="msg-bubble">${text}</div>
          <div class="msg-time">${now}</div>
        </div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'typing-msg';
      div.innerHTML = `<div class="msg-avatar">✨</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    window.addEventListener('load', () => {
      const user = JSON.parse(localStorage.getItem('sh_user') || 'null');
      const name = user ? user.name : 'there';
      setTimeout(() => {
        const welcome = `Hey ${name}! 👋 I'm Zara, your personal stylist here at StyleHub. I've styled people for weddings, interviews, dates, festivals — you name it.<br><br>Tell me what you need help with today! The more details you give me — occasion, what you already own, your vibe — the better I can style you. So, what's the situation? 😊`;
        appendMsg('bot', welcome);
        history.push({ role: 'assistant', content: `Hey ${name}! I'm Zara, your personal stylist here at StyleHub. I've styled people for weddings, interviews, dates, festivals — you name it. Tell me what you need help with today! The more details you give me — occasion, what you already own, your vibe — the better I can style you. So, what's the situation?` });
      }, 400);
    });
  </script>
</body>
</html>
