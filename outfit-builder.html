<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outfit Builder — StyleHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#6C3BFF;--accent:#C850C0;--grad:linear-gradient(135deg,#6C3BFF,#C850C0);--bg:#f3f4f6;--surface:#fff;--border:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;--radius:16px;--font-head:'Outfit',sans-serif;--font-body:'Inter',sans-serif;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}
    .page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .back-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text2);font-size:1.1rem;transition:background .2s;}
    .back-btn:hover{background:#e0e7ff;}
    .page-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;}
    .page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .container{max-width:1100px;margin:0 auto;padding:24px 16px;}
    h2{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
    /* Category tabs */
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .cat-tab{padding:7px 16px;border-radius:999px;font-size:.8rem;font-weight:600;font-family:var(--font-body);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .2s;}
    .cat-tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(108,59,255,.3);}
    /* Item grid */
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:28px;}
    .item-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:all .2s;text-align:center;}
    .item-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 16px rgba(108,59,255,.15);}
    .item-card.selected{border-color:var(--primary);background:#f0ebff;box-shadow:0 0 0 3px rgba(108,59,255,.2);}
    .item-emoji{font-size:2rem;margin-bottom:6px;}
    .item-name{font-size:.72rem;font-weight:600;color:var(--text2);}
    .item-color{width:20px;height:20px;border-radius:50%;margin:4px auto 0;border:2px solid var(--border);}
    /* Outfit preview */
    .outfit-preview{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:24px;}
    .outfit-slots{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
    .outfit-slot{width:90px;text-align:center;}
    .slot-circle{width:70px;height:70px;border-radius:50%;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 6px;background:var(--bg);transition:all .3s;}
    .slot-circle.filled{border-style:solid;border-color:var(--primary);background:#f0ebff;box-shadow:0 4px 12px rgba(108,59,255,.2);}
    .slot-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;}
    /* Score */
    .score-bar{background:var(--bg);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
    .score-num{font-family:var(--font-head);font-size:2.5rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:60px;}
    .score-info h3{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:4px;}
    .score-info p{font-size:.8rem;color:var(--text3);line-height:1.5;}
    .score-track{flex:1;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
    .score-fill{height:100%;border-radius:4px;background:var(--grad);transition:width .6s cubic-bezier(.4,0,.2,1);}
    .reset-btn{padding:10px 20px;border-radius:999px;background:var(--bg);border:1.5px solid var(--border);font-size:.82rem;font-weight:600;font-family:var(--font-body);color:var(--text2);cursor:pointer;transition:all .2s;}
    .reset-btn:hover{border-color:var(--primary);color:var(--primary);}
    .save-btn{padding:10px 24px;border-radius:999px;background:var(--grad);color:#fff;font-size:.82rem;font-weight:700;font-family:var(--font-body);cursor:pointer;box-shadow:0 4px 14px rgba(108,59,255,.35);transition:all .2s;}
    .save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,59,255,.5);}
    .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
    .occasion-tag{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.72rem;font-weight:600;background:#f0ebff;color:var(--primary);border:1px solid #ddd6ff;margin-top:8px;}
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <div class="page-title">👗 Outfit <span>Builder</span></div>
  </header>
  <div class="container">
    <!-- Preview -->
    <div class="outfit-preview">
      <div class="outfit-slots">
        <div class="outfit-slot"><div class="slot-circle" id="slot-top">👕</div><div class="slot-label">Top</div></div>
        <div class="outfit-slot"><div class="slot-circle" id="slot-bottom">👖</div><div class="slot-label">Bottom</div></div>
        <div class="outfit-slot"><div class="slot-circle" id="slot-shoes">👟</div><div class="slot-label">Shoes</div></div>
        <div class="outfit-slot"><div class="slot-circle" id="slot-accessory">💍</div><div class="slot-label">Accessory</div></div>
      </div>
      <div class="score-bar">
        <div class="score-num" id="score-num">--</div>
        <div style="flex:1">
          <div class="score-track"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
          <div class="score-info" style="margin-top:8px"><h3 id="score-label">Select items to score your outfit</h3><p id="score-desc">Pick one item from each category below</p></div>
        </div>
      </div>
      <div id="occasion-out"></div>
      <div class="btn-row">
        <button class="reset-btn" onclick="resetOutfit()">Reset</button>
        <button class="save-btn" onclick="saveOutfit()">Save Outfit 💾</button>
      </div>
    </div>

    <!-- Category selector -->
    <div class="cat-tabs">
      <button class="cat-tab active" onclick="showCat('top',this)">👕 Tops</button>
      <button class="cat-tab" onclick="showCat('bottom',this)">👖 Bottoms</button>
      <button class="cat-tab" onclick="showCat('shoes',this)">👟 Shoes</button>
      <button class="cat-tab" onclick="showCat('accessory',this)">💍 Accessories</button>
    </div>
    <div class="items-grid" id="items-grid"></div>
  </div>

  <script>
    const ITEMS = {
      top:[
        {name:'White Shirt',emoji:'👔',color:'#fff',tags:['formal','casual'],score:9},
        {name:'Black Tee',emoji:'👕',color:'#111',tags:['casual','street'],score:8},
        {name:'Floral Blouse',emoji:'🌸',color:'#f8c8d4',tags:['casual','party'],score:7},
        {name:'Blazer',emoji:'🧥',color:'#2d3436',tags:['formal','office'],score:10},
        {name:'Crop Top',emoji:'👚',color:'#6c5ce7',tags:['casual','party'],score:7},
        {name:'Kurta',emoji:'🥻',color:'#e17055',tags:['ethnic','festive'],score:9},
        {name:'Denim Jacket',emoji:'🧢',color:'#2c3e50',tags:['casual','street'],score:8},
        {name:'Sweater',emoji:'🧶',color:'#fdcb6e',tags:['casual','winter'],score:7},
      ],
      bottom:[
        {name:'Dark Jeans',emoji:'👖',color:'#2c3e50',tags:['casual','smart'],score:9},
        {name:'Chinos',emoji:'🩳',color:'#c8a97e',tags:['smart','office'],score:9},
        {name:'Midi Skirt',emoji:'👗',color:'#fd79a8',tags:['casual','party'],score:8},
        {name:'Trousers',emoji:'👔',color:'#636e72',tags:['formal','office'],score:10},
        {name:'Shorts',emoji:'🩲',color:'#00b894',tags:['casual','summer'],score:6},
        {name:'Lehenga',emoji:'💃',color:'#e84393',tags:['ethnic','festive'],score:10},
        {name:'Palazzo',emoji:'🌀',color:'#a29bfe',tags:['ethnic','casual'],score:8},
        {name:'Mini Skirt',emoji:'✨',color:'#ffeaa7',tags:['party','casual'],score:7},
      ],
      shoes:[
        {name:'White Sneakers',emoji:'👟',color:'#fff',tags:['casual','street'],score:9},
        {name:'Heels',emoji:'👠',color:'#e84393',tags:['formal','party'],score:9},
        {name:'Loafers',emoji:'🥿',color:'#c8a97e',tags:['smart','office'],score:9},
        {name:'Boots',emoji:'👢',color:'#2d3436',tags:['casual','street'],score:8},
        {name:'Sandals',emoji:'🩴',color:'#fdcb6e',tags:['casual','summer'],score:7},
        {name:'Oxford Shoes',emoji:'👞',color:'#6d4c41',tags:['formal','office'],score:10},
        {name:'Kolhapuri',emoji:'🪡',color:'#e17055',tags:['ethnic','festive'],score:9},
        {name:'Sneakers',emoji:'👟',color:'#6c5ce7',tags:['casual','street'],score:8},
      ],
      accessory:[
        {name:'Watch',emoji:'⌚',color:'#b2bec3',tags:['formal','smart'],score:9},
        {name:'Gold Necklace',emoji:'📿',color:'#f9ca24',tags:['party','ethnic'],score:9},
        {name:'Sunglasses',emoji:'🕶️',color:'#2d3436',tags:['casual','summer'],score:8},
        {name:'Handbag',emoji:'👜',color:'#c8a97e',tags:['formal','casual'],score:9},
        {name:'Scarf',emoji:'🧣',color:'#fd79a8',tags:['casual','winter'],score:7},
        {name:'Earrings',emoji:'💎',color:'#a29bfe',tags:['party','ethnic'],score:8},
        {name:'Belt',emoji:'🪢',color:'#2d3436',tags:['formal','smart'],score:8},
        {name:'Cap',emoji:'🧢',color:'#00b894',tags:['casual','street'],score:6},
      ]
    };

    const selected = {top:null,bottom:null,shoes:null,accessory:null};
    let currentCat = 'top';

    function showCat(cat, btn) {
      currentCat = cat;
      document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('items-grid');
      grid.innerHTML = '';
      ITEMS[currentCat].forEach((item,i) => {
        const div = document.createElement('div');
        div.className = 'item-card' + (selected[currentCat]===i?' selected':'');
        div.innerHTML = `<div class="item-emoji">${item.emoji}</div><div class="item-name">${item.name}</div><div class="item-color" style="background:${item.color}"></div>`;
        div.onclick = () => selectItem(currentCat, i, div);
        grid.appendChild(div);
      });
    }

    function selectItem(cat, idx, el) {
      selected[cat] = idx;
      const item = ITEMS[cat][idx];
      const slot = document.getElementById('slot-'+cat);
      slot.textContent = item.emoji;
      slot.classList.add('filled');
      renderGrid();
      updateScore();
    }

    function updateScore() {
      const cats = ['top','bottom','shoes','accessory'];
      const filled = cats.filter(c=>selected[c]!==null);
      if (filled.length < 2) { document.getElementById('score-num').textContent='--'; document.getElementById('score-fill').style.width='0%'; document.getElementById('score-label').textContent='Select more items'; document.getElementById('score-desc').textContent='Pick items from each category'; document.getElementById('occasion-out').innerHTML=''; return; }

      // Calculate score based on tag compatibility
      const tags = filled.map(c=>ITEMS[c][selected[c]].tags);
      const allTags = tags.flat();
      const tagCount = {};
      allTags.forEach(t=>tagCount[t]=(tagCount[t]||0)+1);
      const maxMatch = Math.max(...Object.values(tagCount));
      const baseScore = filled.reduce((s,c)=>s+ITEMS[c][selected[c]].score,0)/filled.length;
      const compatibility = (maxMatch/filled.length)*100;
      const finalScore = Math.round((baseScore*0.5)+(compatibility*0.5));

      document.getElementById('score-num').textContent = finalScore;
      document.getElementById('score-fill').style.width = finalScore+'%';

      let label, desc, occasion;
      if(finalScore>=85){label='🔥 Stunning Outfit!';desc='Perfect color harmony and occasion match. You\'re going to turn heads.';occasion='Evening / Party / Special Occasion';}
      else if(finalScore>=70){label='✨ Great Combination';desc='Well-matched pieces with good style coherence. Solid choice.';occasion='Casual / Smart Casual / Brunch';}
      else if(finalScore>=55){label='👍 Decent Look';desc='Works together but could be elevated with a better accessory or shoe choice.';occasion='Casual / Everyday';}
      else{label='⚠️ Needs Work';desc='These pieces clash in style or occasion. Try mixing different categories.';occasion='Reconsider the combination';}

      document.getElementById('score-label').textContent = label;
      document.getElementById('score-desc').textContent = desc;
      document.getElementById('occasion-out').innerHTML = filled.length>=3?`<span class="occasion-tag">Best for: ${occasion}</span>`:'';
    }

    function resetOutfit() {
      Object.keys(selected).forEach(k=>{selected[k]=null;});
      ['top','bottom','shoes','accessory'].forEach(c=>{
        const slot=document.getElementById('slot-'+c);
        slot.classList.remove('filled');
        slot.textContent={top:'👕',bottom:'👖',shoes:'👟',accessory:'💍'}[c];
      });
      document.getElementById('score-num').textContent='--';
      document.getElementById('score-fill').style.width='0%';
      document.getElementById('score-label').textContent='Select items to score your outfit';
      document.getElementById('score-desc').textContent='Pick one item from each category below';
      document.getElementById('occasion-out').innerHTML='';
      renderGrid();
    }

    function saveOutfit() {
      const filled = Object.keys(selected).filter(k=>selected[k]!==null);
      if(filled.length<2){alert('Select at least 2 items to save!');return;}
      const outfit = {};
      filled.forEach(c=>outfit[c]=ITEMS[c][selected[c]].name);
      const saved = JSON.parse(localStorage.getItem('sh_outfits')||'[]');
      saved.push({outfit,date:new Date().toLocaleDateString(),score:document.getElementById('score-num').textContent});
      localStorage.setItem('sh_outfits',JSON.stringify(saved));
      alert('✅ Outfit saved to your Wishlist page!');
    }

    renderGrid();
  </script>
</body>
</html>
