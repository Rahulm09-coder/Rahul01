<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Outfit — StyleHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#6C3BFF;--grad:linear-gradient(135deg,#6C3BFF,#C850C0);--bg:#f3f4f6;--surface:#fff;--border:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;--radius:16px;--font-head:'Outfit',sans-serif;--font-body:'Inter',sans-serif;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}
    .page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .back-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text2);font-size:1.1rem;}
    .page-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;}
    .page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .container{max-width:700px;margin:0 auto;padding:24px 16px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;}
    .search-row{display:flex;gap:10px;}
    .city-input{flex:1;padding:13px 18px;border:1.5px solid var(--border);border-radius:12px;font-size:.9rem;font-family:var(--font-body);color:var(--text);outline:none;transition:border-color .2s;}
    .city-input:focus{border-color:var(--primary);}
    .search-btn{padding:13px 22px;border-radius:12px;background:var(--grad);color:#fff;font-size:.88rem;font-weight:700;font-family:var(--font-body);cursor:pointer;border:none;box-shadow:0 4px 14px rgba(108,59,255,.35);white-space:nowrap;}
    .weather-card{border-radius:16px;padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
    .weather-card::before{content:'';position:absolute;inset:0;opacity:.15;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
    .weather-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .weather-city{font-family:var(--font-head);font-size:1.4rem;font-weight:800;}
    .weather-desc{font-size:.85rem;opacity:.85;margin-top:2px;}
    .weather-temp{font-family:var(--font-head);font-size:3rem;font-weight:800;line-height:1;}
    .weather-meta{display:flex;gap:16px;font-size:.78rem;opacity:.8;}
    .outfit-section h3{font-family:var(--font-head);font-size:1.1rem;font-weight:700;margin-bottom:14px;}
    .outfit-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
    .outfit-item{background:var(--bg);border-radius:12px;padding:14px;text-align:center;}
    .outfit-item .oi-emoji{font-size:2rem;margin-bottom:6px;}
    .outfit-item .oi-name{font-size:.78rem;font-weight:600;color:var(--text2);}
    .outfit-item .oi-why{font-size:.68rem;color:var(--text3);margin-top:3px;}
    .palette-row{display:flex;gap:8px;margin-top:16px;align-items:center;}
    .palette-row span{width:32px;height:32px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
    .palette-label{font-size:.78rem;font-weight:600;color:var(--text3);}
    .error-msg{text-align:center;padding:20px;color:#ef4444;font-size:.88rem;}
    .loading{text-align:center;padding:30px;color:var(--text3);}
    .loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);animation:ld .8s infinite alternate;margin:0 3px;}
    .loading-dot:nth-child(2){animation-delay:.2s;}
    .loading-dot:nth-child(3){animation-delay:.4s;}
    @keyframes ld{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    .note{font-size:.75rem;color:var(--text3);text-align:center;margin-top:8px;}
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <div class="page-title">🌤️ Weather <span>Outfit</span></div>
  </header>
  <div class="container">
    <div class="card">
      <h3 style="font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:14px;">Enter your city to get today's outfit suggestion</h3>
      <div class="search-row">
        <input class="city-input" id="city-input" placeholder="e.g. Mumbai, Delhi, London…" onkeydown="if(event.key==='Enter')getWeather()"/>
        <button class="search-btn" onclick="getWeather()">Get Outfit 🌤️</button>
      </div>
      <p class="note">Uses real-time weather data via Open-Meteo (free, no API key needed)</p>
    </div>
    <div id="weather-out"></div>
  </div>
  <script>
    async function getWeather(){
      const city=document.getElementById('city-input').value.trim();
      if(!city)return;
      const out=document.getElementById('weather-out');
      out.innerHTML='<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><p style="margin-top:12px;font-size:.85rem">Fetching weather…</p></div>';
      try{
        // Geocode city
        const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
        const geoData=await geoRes.json();
        if(!geoData.results||!geoData.results.length){out.innerHTML='<div class="error-msg">❌ City not found. Try a different spelling.</div>';return;}
        const{latitude,longitude,name,country}=geoData.results[0];
        // Get weather
        const wRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto`);
        const wData=await wRes.json();
        const{temperature_2m:temp,relative_humidity_2m:humidity,wind_speed_10m:wind,weather_code:code}=wData.current;
        renderWeather(name,country,temp,humidity,wind,code);
      }catch(e){out.innerHTML='<div class="error-msg">❌ Could not fetch weather. Check your connection.</div>';}
    }

    function weatherInfo(code,temp){
      if(code===0)return{icon:'☀️',desc:'Clear Sky'};
      if(code<=2)return{icon:'⛅',desc:'Partly Cloudy'};
      if(code<=3)return{icon:'☁️',desc:'Overcast'};
      if(code<=48)return{icon:'🌫️',desc:'Foggy'};
      if(code<=57)return{icon:'🌧️',desc:'Drizzle'};
      if(code<=67)return{icon:'🌧️',desc:'Rainy'};
      if(code<=77)return{icon:'❄️',desc:'Snowy'};
      if(code<=82)return{icon:'🌦️',desc:'Showers'};
      if(code<=99)return{icon:'⛈️',desc:'Thunderstorm'};
      return{icon:'🌡️',desc:'Variable'};
    }

    function getOutfitAdvice(temp,code,humidity,wind){
      const isRain=code>=51&&code<=99;
      const isHot=temp>=30;
      const isWarm=temp>=22&&temp<30;
      const isMild=temp>=15&&temp<22;
      const isCool=temp>=8&&temp<15;
      const isCold=temp<8;
      const isWindy=wind>20;

      if(isCold||temp<8){
        return{
          bg:'linear-gradient(135deg,#2c3e50,#3498db)',
          items:[{e:'🧥',n:'Heavy Coat',w:'Essential below 8°C'},{e:'🧣',n:'Scarf & Gloves',w:'Protect extremities'},{e:'🧶',n:'Thick Sweater',w:'Thermal layering'},{e:'👢',n:'Boots',w:'Warm & waterproof'},{e:'🧤',n:'Gloves',w:'Keep hands warm'}],
          palette:['#2c3e50','#636e72','#b2bec3','#dfe6e9'],
          tip:'Layer up! Base layer + mid layer + outer coat. Stick to dark, warm tones.',
          colors:'Dark navy, charcoal, deep burgundy, forest green'
        };
      }
      if(isCool){
        return{
          bg:'linear-gradient(135deg,#636e72,#74b9ff)',
          items:[{e:'🧥',n:'Light Jacket',w:'Perfect for 8-15°C'},{e:'👔',n:'Long Sleeve Top',w:'Comfortable base'},{e:'👖',n:'Full Trousers',w:'Keep legs warm'},{e:'👞',n:'Closed Shoes',w:'Avoid sandals'},{e:'🧣',n:'Light Scarf',w:'Optional warmth'}],
          palette:['#636e72','#74b9ff','#dfe6e9','#f5f6fa'],
          tip:'A denim jacket or light blazer is perfect. Layering is key.',
          colors:'Grey, light blue, camel, olive, cream'
        };
      }
      if(isMild){
        return{
          bg:'linear-gradient(135deg,#00b894,#55efc4)',
          items:[{e:'👕',n:'Light Shirt',w:'Comfortable in mild weather'},{e:'👖',n:'Chinos or Jeans',w:'Versatile choice'},{e:'👟',n:'Sneakers',w:'Casual and comfortable'},{e:'🧥',n:'Carry a Jacket',w:'Evenings get cooler'},{e:'👜',n:'Crossbody Bag',w:'Hands-free convenience'}],
          palette:['#00b894','#55efc4','#fdcb6e','#e17055'],
          tip:'Perfect layering weather. A light cardigan or denim jacket is ideal.',
          colors:'Sage green, warm beige, terracotta, sky blue'
        };
      }
      if(isWarm&&!isRain){
        return{
          bg:'linear-gradient(135deg,#f9ca24,#f0932b)',
          items:[{e:'👕',n:'Breathable Top',w:'Cotton or linen'},{e:'🩳',n:'Light Bottoms',w:'Shorts or light trousers'},{e:'🕶️',n:'Sunglasses',w:'UV protection essential'},{e:'🩴',n:'Sandals',w:'Let feet breathe'},{e:'🧴',n:'Sunscreen',w:'SPF 30+ minimum'}],
          palette:['#f9ca24','#fdcb6e','#ffffff','#74b9ff'],
          tip:'Light, breathable fabrics only. Linen and cotton are your best friends.',
          colors:'White, sky blue, coral, mint, light yellow'
        };
      }
      if(isHot){
        return{
          bg:'linear-gradient(135deg,#e84393,#f9ca24)',
          items:[{e:'👗',n:'Flowy Dress/Kurta',w:'Maximum airflow'},{e:'🕶️',n:'Sunglasses',w:'Essential above 30°C'},{e:'🧴',n:'Sunscreen SPF50',w:'Protect your skin'},{e:'🩴',n:'Open Sandals',w:'Keep feet cool'},{e:'🎒',n:'Light Bag',w:'Avoid heavy loads'}],
          palette:['#ffffff','#74b9ff','#ffeaa7','#fd79a8'],
          tip:'Minimal clothing, maximum breathability. Avoid dark colors — they absorb heat.',
          colors:'White, pastels, light blue, mint, blush pink'
        };
      }
      if(isRain){
        return{
          bg:'linear-gradient(135deg,#2d3436,#636e72)',
          items:[{e:'☂️',n:'Umbrella',w:'Non-negotiable in rain'},{e:'🧥',n:'Waterproof Jacket',w:'Stay dry'},{e:'👢',n:'Waterproof Boots',w:'Avoid wet feet'},{e:'👖',n:'Dark Trousers',w:'Hides water splashes'},{e:'🎒',n:'Waterproof Bag',w:'Protect your belongings'}],
          palette:['#2d3436','#636e72','#74b9ff','#dfe6e9'],
          tip:'Waterproof everything. Avoid light colors and suede shoes.',
          colors:'Navy, charcoal, dark grey, deep teal'
        };
      }
      return{bg:'linear-gradient(135deg,#6C3BFF,#C850C0)',items:[{e:'👕',n:'Comfortable Top',w:'Versatile choice'},{e:'👖',n:'Casual Trousers',w:'Easy to wear'},{e:'👟',n:'Sneakers',w:'Always reliable'},{e:'🧥',n:'Light Layer',w:'Just in case'},{e:'👜',n:'Your Bag',w:'Carry essentials'}],palette:['#6C3BFF','#C850C0','#fff','#f3f4f6'],tip:'Dress comfortably and carry a light layer.',colors:'Neutrals and your personal favorites'};
    }

    function renderWeather(city,country,temp,humidity,wind,code){
      const{icon,desc}=weatherInfo(code,temp);
      const advice=getOutfitAdvice(temp,code,humidity,wind);
      document.getElementById('weather-out').innerHTML=`
        <div class="weather-card" style="background:${advice.bg}">
          <div class="weather-top">
            <div><div class="weather-city">${icon} ${city}, ${country}</div><div class="weather-desc">${desc}</div></div>
            <div class="weather-temp">${Math.round(temp)}°C</div>
          </div>
          <div class="weather-meta"><span>💧 ${humidity}% humidity</span><span>💨 ${Math.round(wind)} km/h wind</span></div>
        </div>
        <div class="card outfit-section">
          <h3>👗 Today's Outfit Recommendation</h3>
          <div class="outfit-items">${advice.items.map(i=>`<div class="outfit-item"><div class="oi-emoji">${i.e}</div><div class="oi-name">${i.n}</div><div class="oi-why">${i.w}</div></div>`).join('')}</div>
          <div style="margin-top:16px;padding:14px;background:#f8f9fa;border-radius:12px;">
            <p style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px;">💡 Styling Tip</p>
            <p style="font-size:.82rem;color:#6b7280;line-height:1.6">${advice.tip}</p>
          </div>
          <div class="palette-row">
            ${advice.palette.map(c=>`<span style="background:${c}"></span>`).join('')}
            <span class="palette-label">Best colors: ${advice.colors}</span>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
