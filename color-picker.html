<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Picker — StyleHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#6C3BFF;--grad:linear-gradient(135deg,#6C3BFF,#C850C0);--bg:#f3f4f6;--surface:#fff;--border:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;--radius:16px;--font-head:'Outfit',sans-serif;--font-body:'Inter',sans-serif;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}
    .page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .back-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text2);font-size:1.1rem;}
    .page-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;}
    .page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .container{max-width:700px;margin:0 auto;padding:24px 16px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;}
    .pickers{display:flex;gap:20px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
    .picker-wrap{text-align:center;}
    .picker-wrap label{display:block;font-size:.78rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
    input[type=color]{width:90px;height:90px;border:none;border-radius:50%;cursor:pointer;padding:0;background:none;-webkit-appearance:none;}
    input[type=color]::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;}
    input[type=color]::-webkit-color-swatch{border:3px solid var(--border);border-radius:50%;box-shadow:0 4px 14px rgba(0,0,0,.15);}
    .plus{font-size:2rem;color:var(--text3);font-weight:300;}
    .preview-bar{height:60px;border-radius:12px;display:flex;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.1);}
    .preview-half{flex:1;transition:background .3s;}
    /* Score ring */
    .score-ring-wrap{display:flex;flex-direction:column;align-items:center;margin:16px 0;}
    .score-ring{position:relative;width:120px;height:120px;}
    .score-ring svg{transform:rotate(-90deg);}
    .score-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:2rem;font-weight:800;}
    .score-ring-label{font-family:var(--font-head);font-size:1.1rem;font-weight:700;margin-top:8px;}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
    .result-item{background:var(--bg);border-radius:12px;padding:14px;}
    .result-item h4{font-size:.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .result-item p{font-size:.85rem;font-weight:600;color:var(--text);}
    .presets{display:flex;flex-wrap:wrap;gap:8px;}
    .preset{display:flex;gap:0;border-radius:999px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s;height:32px;}
    .preset:hover{border-color:var(--primary);}
    .preset span{width:40px;height:100%;display:block;}
    .preset-label{font-size:.72rem;font-weight:600;color:var(--text2);padding:0 10px;display:flex;align-items:center;background:var(--surface);border-left:1px solid var(--border);}
    .analyze-btn{width:100%;padding:14px;border-radius:999px;background:var(--grad);color:#fff;font-size:.95rem;font-weight:700;font-family:var(--font-body);cursor:pointer;box-shadow:0 4px 14px rgba(108,59,255,.35);border:none;margin-top:8px;transition:all .2s;}
    .analyze-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,59,255,.5);}
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <div class="page-title">🎨 Color <span>Compatibility</span></div>
  </header>
  <div class="container">
    <div class="card">
      <div class="pickers">
        <div class="picker-wrap"><label>Color 1</label><input type="color" id="c1" value="#6C3BFF" oninput="updatePreview()"/></div>
        <div class="plus">+</div>
        <div class="picker-wrap"><label>Color 2</label><input type="color" id="c2" value="#C850C0" oninput="updatePreview()"/></div>
      </div>
      <div class="preview-bar"><div class="preview-half" id="ph1"></div><div class="preview-half" id="ph2"></div></div>
      <button class="analyze-btn" onclick="analyze()">Analyze Compatibility ✨</button>
    </div>

    <div class="card" id="result-card" style="display:none">
      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" fill="none" stroke="#e5e7eb" stroke-width="10"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#rg)" stroke-width="10" stroke-linecap="round" id="ring-arc" stroke-dasharray="314" stroke-dashoffset="314"/>
            <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6C3BFF"/><stop offset="100%" stop-color="#C850C0"/></linearGradient></defs>
          </svg>
          <div class="score-ring-num" id="ring-num">0</div>
        </div>
        <div class="score-ring-label" id="ring-label"></div>
      </div>
      <div class="result-grid">
        <div class="result-item"><h4>Harmony Type</h4><p id="res-harmony">—</p></div>
        <div class="result-item"><h4>Best Occasion</h4><p id="res-occasion">—</p></div>
        <div class="result-item"><h4>Style Vibe</h4><p id="res-vibe">—</p></div>
        <div class="result-item"><h4>Tip</h4><p id="res-tip">—</p></div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:14px;">✨ Try Popular Combos</h3>
      <div class="presets" id="presets"></div>
    </div>
  </div>

  <script>
    const PRESETS=[
      {name:'Navy + Gold',c1:'#1a1a2e',c2:'#e2b96f'},
      {name:'White + Black',c1:'#ffffff',c2:'#111111'},
      {name:'Blush + Sage',c1:'#f8c8d4',c2:'#87a878'},
      {name:'Cobalt + Orange',c1:'#0052cc',c2:'#ff6b35'},
      {name:'Teal + Terracotta',c1:'#00b894',c2:'#e17055'},
      {name:'Purple + Pink',c1:'#6c5ce7',c2:'#fd79a8'},
      {name:'Camel + White',c1:'#c8a97e',c2:'#ffffff'},
      {name:'Red + Black',c1:'#e84393',c2:'#2d3436'},
    ];

    function updatePreview(){
      document.getElementById('ph1').style.background=document.getElementById('c1').value;
      document.getElementById('ph2').style.background=document.getElementById('c2').value;
    }
    updatePreview();

    // Render presets
    const pEl=document.getElementById('presets');
    PRESETS.forEach(p=>{
      const div=document.createElement('div');
      div.className='preset';
      div.innerHTML=`<span style="background:${p.c1}"></span><span style="background:${p.c2}"></span><span class="preset-label">${p.name}</span>`;
      div.onclick=()=>{document.getElementById('c1').value=p.c1;document.getElementById('c2').value=p.c2;updatePreview();analyze();};
      pEl.appendChild(div);
    });

    function hexToHsl(hex){
      let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
      return[h*360,s*100,l*100];
    }

    function analyze(){
      const c1=document.getElementById('c1').value,c2=document.getElementById('c2').value;
      const [h1,s1,l1]=hexToHsl(c1),[h2,s2,l2]=hexToHsl(c2);
      let hDiff=Math.abs(h1-h2);if(hDiff>180)hDiff=360-hDiff;
      const lDiff=Math.abs(l1-l2);

      let score,harmony,occasion,vibe,tip;

      // Complementary (opposite ~180°)
      if(hDiff>=150&&hDiff<=210){score=92;harmony='Complementary';occasion='Evening / Party / Statement';vibe='Bold & High Contrast';tip='Use one as dominant (70%) and the other as accent (30%) for best results.';}
      // Analogous (close ~30°)
      else if(hDiff<=40){score=88;harmony='Analogous';occasion='Casual / Everyday / Brunch';vibe='Harmonious & Cohesive';tip='These colors sit next to each other on the wheel — naturally pleasing to the eye.';}
      // Triadic (~120°)
      else if(hDiff>=100&&hDiff<=140){score=80;harmony='Triadic';occasion='Casual / Creative / Street';vibe='Vibrant & Playful';tip='Balance with a neutral (white/black/beige) as the third element.';}
      // Split complementary (~150°)
      else if(hDiff>=130&&hDiff<=150){score=85;harmony='Split Complementary';occasion='Smart Casual / Brunch';vibe='Sophisticated Contrast';tip='Softer than full complementary — great for everyday wear.';}
      // Neutral (low saturation)
      else if(s1<20&&s2<20){score=95;harmony='Neutral Tonal';occasion='Office / Formal / All-Day';vibe='Quiet Luxury';tip='Neutral combinations are timeless and always professional.';}
      // High contrast light/dark
      else if(lDiff>50){score=90;harmony='High Contrast';occasion='Formal / Evening / Office';vibe='Classic & Powerful';tip='High contrast is always impactful — great for making a statement.';}
      else{score=65;harmony='Discordant';occasion='Avoid unless intentional';vibe='Clashing';tip='These colors compete. Add a neutral (white, black, beige) to bridge them.';}

      // Animate ring
      document.getElementById('result-card').style.display='block';
      document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'nearest'});
      let cur=0;const target=score;
      const interval=setInterval(()=>{
        cur=Math.min(cur+2,target);
        document.getElementById('ring-num').textContent=cur;
        document.getElementById('ring-arc').style.strokeDashoffset=314-(314*cur/100);
        if(cur>=target)clearInterval(interval);
      },16);

      const labels={92:'🔥 Stunning Match',88:'✨ Great Harmony',80:'👍 Works Well',85:'💫 Sophisticated',95:'🤍 Timeless',90:'⚡ Bold Classic',65:'⚠️ Needs a Neutral'};
      document.getElementById('ring-label').textContent=labels[score]||'Good Combo';
      document.getElementById('res-harmony').textContent=harmony;
      document.getElementById('res-occasion').textContent=occasion;
      document.getElementById('res-vibe').textContent=vibe;
      document.getElementById('res-tip').textContent=tip;
    }
  </script>
</body>
</html>
