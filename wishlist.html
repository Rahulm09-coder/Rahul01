<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist — StyleHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#6C3BFF;--grad:linear-gradient(135deg,#6C3BFF,#C850C0);--bg:#f3f4f6;--surface:#fff;--border:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;--radius:16px;--font-head:'Outfit',sans-serif;--font-body:'Inter',sans-serif;}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;}
    .page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .back-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text2);font-size:1.1rem;}
    .page-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;}
    .page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .container{max-width:900px;margin:0 auto;padding:24px 16px;}
    .empty{text-align:center;padding:60px 20px;color:var(--text3);}
    .empty-icon{font-size:3rem;margin-bottom:12px;}
    .empty h3{font-family:var(--font-head);font-size:1.2rem;font-weight:700;margin-bottom:8px;color:var(--text2);}
    .empty p{font-size:.85rem;line-height:1.6;}
    .go-btn{display:inline-block;margin-top:16px;padding:10px 24px;border-radius:999px;background:var(--grad);color:#fff;font-size:.85rem;font-weight:700;text-decoration:none;box-shadow:0 4px 14px rgba(108,59,255,.35);}
    .section-title{font-family:var(--font-head);font-size:1.1rem;font-weight:800;margin-bottom:16px;color:var(--text);}
    .outfit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px;}
    .outfit-saved{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .outfit-saved-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .outfit-saved-date{font-size:.72rem;color:var(--text3);}
    .outfit-score{font-family:var(--font-head);font-size:1.1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .outfit-pieces{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
    .outfit-piece{padding:4px 10px;background:#f0ebff;border-radius:999px;font-size:.72rem;font-weight:600;color:var(--primary);}
    .del-btn{padding:6px 14px;border-radius:999px;background:var(--bg);border:1px solid var(--border);font-size:.72rem;font-weight:600;color:#ef4444;cursor:pointer;font-family:var(--font-body);}
    .del-btn:hover{background:#fff1f1;border-color:#ef4444;}
    .clear-btn{padding:8px 20px;border-radius:999px;background:var(--bg);border:1.5px solid var(--border);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--font-body);margin-bottom:20px;}
    .clear-btn:hover{border-color:#ef4444;color:#ef4444;}
  </style>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <div class="page-title">❤️ My <span>Wishlist</span></div>
  </header>
  <div class="container" id="container"></div>
  <script>
    function render(){
      const outfits=JSON.parse(localStorage.getItem('sh_outfits')||'[]');
      const c=document.getElementById('container');
      if(!outfits.length){
        c.innerHTML=`<div class="empty"><div class="empty-icon">💔</div><h3>Your wishlist is empty</h3><p>Save outfits from the Outfit Builder to see them here.</p><a href="outfit-builder.html" class="go-btn">Open Outfit Builder 👗</a></div>`;
        return;
      }
      c.innerHTML=`<div class="section-title">Saved Outfits (${outfits.length})</div><button class="clear-btn" onclick="clearAll()">Clear All</button><div class="outfit-grid" id="grid"></div>`;
      const grid=document.getElementById('grid');
      outfits.forEach((o,i)=>{
        const pieces=Object.entries(o.outfit).map(([k,v])=>`<span class="outfit-piece">${v}</span>`).join('');
        const div=document.createElement('div');
        div.className='outfit-saved';
        div.innerHTML=`<div class="outfit-saved-top"><span class="outfit-saved-date">📅 ${o.date}</span><span class="outfit-score">Score: ${o.score}</span></div><div class="outfit-pieces">${pieces}</div><button class="del-btn" onclick="deleteOutfit(${i})">Remove ✕</button>`;
        grid.appendChild(div);
      });
    }
    function deleteOutfit(i){
      const outfits=JSON.parse(localStorage.getItem('sh_outfits')||'[]');
      outfits.splice(i,1);
      localStorage.setItem('sh_outfits',JSON.stringify(outfits));
      render();
    }
    function clearAll(){if(confirm('Clear all saved outfits?')){localStorage.removeItem('sh_outfits');render();}}
    render();
  </script>
</body>
</html>
